async function testConnection(){
  const proj=activeProject();
  saveDevopsConfig();
  if(!devopsConfigured(proj)){showToast('Completa org, proyecto y PAT','error');return;}
  const btn=document.getElementById('btn-test-conn');
  if(btn){btn.disabled=true;btn.textContent='Probando...';}
  try{
    const url=devopsUrl(proj,'projects?api-version=7.0&$top=1');
    const resp=await fetch(url,{method:'GET',headers:{Authorization:'Basic '+btoa(':'+proj.devops.pat.trim())}});
    if(resp.status===401)throw new Error('PAT inválido (401)');
    if(resp.status===404)throw new Error('Organización no encontrada (404)');
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const projUrl=devopsUrl(proj,'projects/'+encodeURIComponent(proj.devops.project.trim())+'?api-version=7.0');
    const pResp=await fetch(projUrl,{method:'GET',headers:{Authorization:'Basic '+btoa(':'+proj.devops.pat.trim())}});
    if(!pResp.ok)throw new Error(`Proyecto "${proj.devops.project}" no encontrado`);
    const pData=await pResp.json();
    showToast(`✓ Conexión exitosa — "${pData.name}"`,'success');
  }catch(err){showToast('✕ '+err.message,'error');}
  finally{const b=document.getElementById('btn-test-conn');if(b){b.disabled=false;b.textContent='Probar conexión';}}
}

async function createWI(taskId){
  const proj=activeProject();
  if(!devopsConfigured(proj)){showModal('DevOps no configurado','Completa org, proyecto y PAT.',()=>{});return;}
  const t=proj.tasks.find(x=>x.id===taskId);if(!t)return;
  if(t.wiId){showModal('WI ya existe',`Ya tiene WI #${t.wiId}.`,()=>{});return;}
  t.wiCreating=true;render();
  const fields=buildDevOpsTaskFields(t,proj);
  try{
    const wiType=encodeURIComponent(proj.devops.wiType||'Issue');
    const url=devopsUrl(proj,`wit/workitems/$${wiType}?api-version=7.0`);
    const resp=await fetch(url,{method:'POST',headers:devopsHeaders(proj),body:JSON.stringify(fields)});
    if(!resp.ok){const err=await resp.text();throw new Error(`HTTP ${resp.status}: ${err}`);}
    const data=await resp.json();
    t.wiId=data.id;t.wiCreating=false;saveState();render();
    showToast(`✓ WI #${data.id} creado`,'success');
    const post=buildDevOpsTaskFields(t,proj,{includeState:true,includeAssignedTo:true});
    if(post.length){
      const pUrl=devopsUrl(proj,`wit/workitems/${data.id}?api-version=7.0`);
      fetch(pUrl,{method:'PATCH',headers:devopsHeaders(proj),body:JSON.stringify(post)}).catch(()=>{});
    }
  }catch(err){
    t.wiCreating=false;t.wiError=true;
    setTimeout(()=>{const tx=activeProject().tasks.find(x=>x.id===taskId);if(tx)tx.wiError=false;render();},4000);
    render();showToast(`Error al crear WI: ${err.message}`,'error');
  }
}

}

function togglePanel(id){
  const body=document.getElementById(id);if(!body)return;
  const isCollapsed=body.classList.contains('collapsed');
  body.classList.toggle('collapsed',!isCollapsed);
  const btn=document.querySelector(`[data-panel="${id}"]`);
  if(btn)btn.textContent=isCollapsed?'▲ Ocultar':'▼ Mostrar';
  try{localStorage.setItem('panel_'+id,isCollapsed?'open':'closed');}catch(e){}
}
function initPanels(){
  ['devops-body','devmgr-body'].forEach(id=>{
    try{
      const body=document.getElementById(id);
      const btn=document.querySelector(`[data-panel="${id}"]`);
      const saved=localStorage.getItem('panel_'+id);
      const open=saved==='open'?true:false;
      if(body)body.classList.toggle('collapsed',!open);
      if(btn)btn.textContent=open?'▲ Ocultar':'▼ Mostrar';
      if(!saved)localStorage.setItem('panel_'+id,'closed');
    }catch(e){}
  });
}

function importJSON(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const imp=JSON.parse(e.target.result);
      if(imp.projects){
        // Full export
        showModal('Importar todo',`¿Reemplazar todos los proyectos con <strong>${f.name}</strong>?`,()=>{
          G=imp;if(!G.globalDevs)G.globalDevs=[];
          if(!G.activeProjectId&&G.projects.length)G.activeProjectId=G.projects[0].id;
          saveState();renderSidebar();render();
        });
      }else if(imp.tasks&&imp.devs){
        // Single project export
        showModal('Importar proyecto',`¿Agregar proyecto <strong>${imp.name||f.name}</strong>?`,()=>{
          if(!imp.id)imp.id='proj_'+Date.now();
          if(!imp.color)imp.color=PROJ_COLORS[0];
          if(!imp.devops)imp.devops={...DEF_DEVOPS};
          G.projects.push(imp);G.activeProjectId=imp.id;
          saveState();renderSidebar();render();
        });
      }else throw 0;
    }catch(e){alert('Archivo no válido.');}
  };
  r.readAsText(f);ev.target.value='';
}

        <div style="font-size:11px;color:#888780;">Generado el ${now.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'})}</div>
      </div>
      <div style="text-align:right;font-size:11px;color:#5f5e5a;">
        <div>Inicio: ${fmt(minD)} → Fin: ${fmt(maxD)}</div>
        <div>${wdB(minD,maxD)} días hábiles · ~${Math.ceil(wdB(minD,maxD)/5)} semanas</div>
        <div>Backlog: ${backlogH}h · Comprometidas: ${committedH}h</div>
        <div>${sch.filter(t=>t.estado==='completado').length}/${sch.length} completados · ${activeCommittedH}h restantes comprometidas</div>

      </div>
    </div>
    <div style="padding:0 24px 16px;">
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;">
        ${devs
          .filter(d=>pdfTasks.some(t=>t.adev?.id===d.id))
          .sort((a,b)=>{
            const hA=pdfTasks.filter(t=>t.adev?.id===a.id).reduce((s,t)=>s+taskCountableHours(t),0);
            const hB=pdfTasks.filter(t=>t.adev?.id===b.id).reduce((s,t)=>s+taskCountableHours(t),0);
            if(hB!==hA)return hB-hA;
            return (a.name||'').localeCompare((b.name||''),'es',{sensitivity:'base'});
          })
          .map(dev=>{
            const col=gc(dev.pi||0);
            const cur=aS.find(t=>t.adev?.id===dev.id&&t.start<=TODAY&&t.end>=TODAY);
            const fr=df[dev.id]&&df[dev.id]<=TODAY;
            const isG=!!G.globalDevs.find(x=>x.id===dev.id);
            const totalHoras=pdfTasks.filter(t=>t.adev?.id===dev.id).reduce((s,t)=>s+taskCountableHours(t),0);
            const totalTareas=pdfTasks.filter(t=>t.adev?.id===dev.id).length;
            return `<div style="border-radius:8px;padding:7px 12px;border:0.5px solid #d3d1c7;background:#fff;border-top:3px solid ${col.bar};min-width:120px;"><div style="font-size:12px;font-weight:500;color:${col.bar};margin-bottom:2px;">${dev.name}${isG?' ★':''}</div><div style="font-size:11px;">${cur?`● En ${cur.id}`:fr?'● Disponible':'● Sin asignación activa'}</div><div style="font-size:10px;color:#888780;margin-top:2px;">${totalHoras}h · ${totalTareas} desarrollo(s)</div></div>`;
          }).join('')}
      </div>
      <table style="border-collapse:collapse;font-size:11px;width:100%;">
        <thead><tr>
          <th style="background:#f1efe8;padding:5px 7px;border:0.5px solid #d3d1c7;width:90px;">Estado</th>
          <th style="background:#f1efe8;padding:5px 7px;border:0.5px solid #d3d1c7;width:130px;white-space:nowrap;">ID</th>
          <th style="background:#f1efe8;padding:5px 7px;border:0.5px solid #d3d1c7;min-width:130px;">Nombre</th>
          <th style="background:#f1efe8;padding:5px 7px;border:0.5px solid #d3d1c7;width:32px;text-align:center;">P</th>
          <th style="background:#f1efe8;padding:5px 7px;border:0.5px solid #d3d1c7;width:44px;text-align:center;">Horas</th>
          <th style="background:#f1efe8;padding:5px 7px;border:0.5px solid #d3d1c7;width:32px;text-align:center;">Días</th>
          <th style="background:#f1efe8;padding:5px 7px;border:0.5px solid #d3d1c7;width:40px;text-align:center;">D.Ret</th>
          <th style="background:#f1efe8;padding:5px 7px;border:0.5px solid #d3d1c7;width:40px;text-align:center;">D.Pru</th>
          <th style="background:#f1efe8;padding:5px 7px;border:0.5px solid #d3d1c7;width:60px;">Dev</th>
          <th style="background:#f1efe8;padding:5px 7px;border:0.5px solid #d3d1c7;width:60px;">WI Cliente</th>
          <th style="background:#f1efe8;padding:5px 7px;border:0.5px solid #d3d1c7;width:86px;">Inicio</th>
          <th style="background:#f1efe8;padding:5px 7px;border:0.5px solid #d3d1c7;width:86px;">Fin</th>
          <th style="background:#f1efe8;padding:0;border:0.5px solid #d3d1c7;width:${tcp}px;vertical-align:top;">
            <table style="width:100%;border-collapse:collapse;font-size:10px;">
              <tr>${ms.map(m=>`<td colspan="${m.n}" style="background:#f1efe8;text-align:center;padding:3px 2px;border:0.5px solid #d3d1c7;font-weight:500;color:#5f5e5a;overflow:hidden;white-space:nowrap;">${m.label}</td>`).join('')}</tr>
              <tr>${cd.map(d=>{const iT=iso(d)===iso(TODAY),iH=HOL.has(iso(d)),iW=d.getDay()===0||d.getDay()===6;const bg=iT?'#fcebeb':iH?'#faeeda':iW?'#f5f5f3':'#fff';const cl=iT?'#e24b4a':iH?'#ba7517':'#b4b2a9';return `<td style="width:${DAY_PX}px;text-align:center;padding:2px 0;font-size:9px;border:0.5px solid #d3d1c7;background:${bg};color:${cl};">${d.getDate()}</td>`;}).join('')}</tr>
            </table>
          </th>
        </tr></thead>
        <tbody>${pdfTasks.map((t,i)=>{
          const col=gc(t.adev?.pi||0);const bg=t.estado==='completado'?'#16A34A':col.bar,fg=t.estado==='completado'?'#ffffff':col.text;
      

          const estBg=t.estado==='nuevo'?'#e6f1fb':t.estado==='aprobado'?'#f1efe8':t.estado==='completado'?'#9fe1cb':t.estado==='en_desarrollo'?'#b5d4f4':t.estado==='pausa_cliente'?'#faeeda':t.estado==='pruebas_cliente'?'#E8E3FF':t.estado==='en_garantia'?'#E3F6EE':'#f1efe8';
          const estCl=t.estado==='nuevo'?'#0c447c':t.estado==='aprobado'?'#5f5e5a':t.estado==='completado'?'#085041':t.estado==='en_desarrollo'?'#0c447c':t.estado==='pausa_cliente'?'#633806':t.estado==='pruebas_cliente'?'#4A3B8F':t.estado==='en_garantia'?'#176B4D':'#5f5e5a';
          const rowBg=i%2===0?'#fff':'#fafaf8';
          return `<tr style="opacity:${t.estado==='completado'?'0.6':'1'}">
            <td style="padding:3px 7px;border:0.5px solid #d3d1c7;background:${rowBg};"><span style="background:${estBg};color:${estCl};font-size:10px;padding:1px 6px;border-radius:8px;font-weight:500;">${t.estado==='nuevo'?'Nuevo':t.estado==='aprobado'?'Aprobado':t.estado==='en_desarrollo'?'En desarrollo':t.estado==='pausa_cliente'?'Pausado':t.estado==='pruebas_cliente'?'Probando':t.estado==='completado'?'Completado':t.estado==='en_garantia'?'En Garantía':'Aprobado'}</span></td>
            <td style="padding:3px 7px;border:0.5px solid #d3d1c7;background:${rowBg};font-weight:500;white-space:nowrap;">${t.id}</td>
            <td style="padding:3px 7px;border:0.5px solid #d3d1c7;background:${rowBg};">${t.name}</td>
            <td style="padding:3px 7px;border:0.5px solid #d3d1c7;background:${rowBg};text-align:center;font-weight:500;">${t.pri}</td>
            <td style="padding:3px 7px;border:0.5px solid #d3d1c7;background:${rowBg};text-align:center;">${taskCountableHours(t)}</td>
            <td style="padding:3px 7px;border:0.5px solid #d3d1c7;background:${rowBg};text-align:center;color:#888780;">${t.days}</td>
            <td style="padding:3px 7px;border:0.5px solid #d3d1c7;background:${rowBg};text-align:center;">${Math.max(0,parseInt(t.delayDays)||0)}</td>
            <td style="padding:3px 7px;border:0.5px solid #d3d1c7;background:${rowBg};text-align:center;">${Math.max(0,parseInt(t.testDays)||0)}</td>
            <td style="padding:3px 7px;border:0.5px solid #d3d1c7;background:${rowBg};"><span style="background:${col.bar}22;color:${col.bar};font-size:10px;padding:1px 5px;border-radius:3px;font-weight:500;">${t.adev?.name||''}</span></td>
            <td style="padding:3px 7px;border:0.5px solid #d3d1c7;background:${rowBg};text-align:center;">${t.wiCliente||'S/N'}</td>
            <td style="padding:3px 7px;border:0.5px solid #d3d1c7;background:${rowBg};">${fmt(t.start)}</td>
            <td style="padding:3px 7px;border:0.5px solid #d3d1c7;background:${rowBg};">${fmt(t.end)}</td>
            <td style="padding:0;border:0.5px solid #d3d1c7;background:${rowBg};height:24px;position:relative;">
              <div style="position:relative;height:24px;width:${tcp}px;">
                <div style="position:absolute;top:0;left:${tpx}px;width:${DAY_PX}px;height:24px;background:rgba(226,75,74,0.07);"></div>
                ${(()=>{
                  if(!t.start||!t.end)return '';
                  const _lx=pxL(t.start,minD);
                  const _bw=pxW(t.start,t.end);
                  return '<div style="position:absolute;top:3px;left:'+_lx+'px;width:'+_bw+'px;height:18px;border-radius:3px;background:'+bg+';display:flex;align-items:center;padding:0 4px;font-size:9px;font-weight:500;color:'+fg+';overflow:hidden;opacity:'+((t.estado==='nuevo'||t.estado==='aprobado')?0.78:1)+';">'+(t.days>4?t.id:'')+'</div>';
                })()}
              </div>
            </td>
          </tr>`;
        }).join('')}
        <tr><td colspan="4" style="padding:5px 7px;border:0.5px solid #d3d1c7;background:#f1efe8;font-weight:500;">Total</td>
          <td style="padding:5px 7px;border:0.5px solid #d3d1c7;background:#f1efe8;text-align:center;font-weight:500;">${tH}</td>
          <td colspan="8" style="border:0.5px solid #d3d1c7;background:#f1efe8;"></td>
          <td style="padding:5px 7px;border:0.5px solid #d3d1c7;background:#f1efe8;font-size:10px;color:#888780;">${wdB(minD,maxD)} días hábiles · fin: ${fmt(maxD)}</td>
        </tr></tbody>
      </table>
    </div>`;
    label.textContent='Capturando...';
    await new Promise(r=>setTimeout(r,120));
    const canvas=await html2canvas(container,{scale:2,useCORS:true,backgroundColor:'#ffffff',logging:false,width:container.scrollWidth,height:container.scrollHeight,windowWidth:container.scrollWidth,windowHeight:container.scrollHeight});
    document.body.removeChild(container);
    label.textContent='Generando PDF...';
    const{jsPDF}=jspdf;
    const iW=canvas.width,iH=canvas.height,pW=iW/2,pH=iH/2;
    const pdf=new jsPDF({orientation:pW>pH?'landscape':'portrait',unit:'px',format:[pW,pH]});
    pdf.addImage(canvas.toDataURL('image/png'),'PNG',0,0,pW,pH,undefined,'FAST');
    const d=new Date();
    pdf.save(`${proj.name}-Plan-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.pdf`);
  }catch(err){console.error(err);alert('Error al generar PDF: '+err.message);}
  finally{overlay.classList.remove('active');btn.disabled=false;}
}

// ═══════════════════════════════════════════════════════════════
// EVENT DELEGATION
// ═══════════════════════════════════════════════════════════════
document.getElementById('root').addEventListener('change',function(e){
  if(e.target.classList.contains('dev-select')){
    const taskId=e.target.getAttribute('data-taskid');
    const devId=e.target.value;
    const proj=activeProject();
    const t=proj.tasks.find(x=>x.id===taskId);if(!t)return;
    t.pdi=devId;
    // User explicitly chose this dev — mark as user-assigned (not auto)
    if(t.estado==='nuevo'||t.estado==='aprobado'){
      t._autoPdi=false;  // user picked it
      t.so=null;t.eo=null;t._manualSo=false;
    }
    saveState();render();
    const sel=document.querySelector(`.dev-select[data-taskid="${taskId}"]`);
    if(sel&&sel.value!==devId)sel.value=devId;
    // Warn about overlap when dev changes on a pending task
    if(t.estado==='nuevo'||t.estado==='aprobado'){
      const _sch=sched(proj).sch;
      const _newTask=_sch.find(x=>x.id===taskId);
      const _newDev=allDevs(proj).find(d=>d.id===devId);
      if(_newTask&&_newDev){
        const _conf=_sch.filter(x=>x.id!==taskId&&x.estado!=='completado'&&x.adev&&x.adev.id===devId&&x.start<_newTask.end&&x.end>_newTask.start);
        if(_conf.length>0)showToast('\u26a0 '+_newDev.name+' solapamiento con '+_conf.map(c=>c.id).join(', '),'error');
        else showToast('\u2713 '+_newDev.name+' disponible desde '+fmt(_newTask.start),'success');
      }
    }
    if(t.wiId&&devopsConfigured(proj)){
      manualSyncWI(taskId);
    }
  }
  if(e.target.classList.contains('estado-select')){
    const taskId=e.target.getAttribute('data-taskid');
    if(!taskId)return;
    setE(taskId,e.target.value);
  }
});

loadState();
// Init sidebar collapsed state
const sb=document.getElementById('sidebar');
if(G.sidebarCollapsed){sb.classList.add('collapsed');const btn=sb.querySelector('.sb-toggle');if(btn)btn.textContent='▶';}
renderSidebar();
render();
setTimeout(initPanels,50);
window.addEventListener('resize',()=>{
  if(!viewingGlobalDevs)requestAnimationFrame(()=>applyRealBarPositions());
});

document.addEventListener('click',e=>{
  const dep=document.getElementById('dep-popup');
  const filter=document.getElementById('filter-popup');
  if(dep&&!dep.contains(e.target)&&!e.target.closest('.dep-btn')){dep.style.display='none';dep.dataset.task='';}
  if(filter&&!filter.contains(e.target)&&!e.target.closest('.filter-btn')){filter.style.display='none';filter.dataset.field='';}
});
</script>
